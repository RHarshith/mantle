services:
  mantle-lab:
    build:
      context: .
      dockerfile: Dockerfile
    image: mantle-lab:latest
    container_name: mantle-lab
    tty: true
    stdin_open: true
    command: ["sleep", "infinity"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
      - SYS_PTRACE
      - SYS_RESOURCE
      - PERFMON
      - BPF
    privileged: true
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    environment:
      - OPENAI_API_KEY
      - AGENT_OBS_ROOT=/workspace/mantle/obs
      - MANTLE_VENV=/opt/mantle-venv
      - MANTLE_AGENT_SETUP_CONFIG=/workspace/mantle/agent_setup/setup.yml
    volumes:
      - ./:/workspace/mantle
      - mantle-home:/root
    ports:
      - "8099:8099"

volumes:
  mantle-home:
