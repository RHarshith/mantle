<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Trace Dashboard</title>
  <script src="https://unpkg.com/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f7fb; color: #1b1f24; }
    .layout { display: grid; grid-template-columns: 250px 1fr 340px; height: 100vh; }
    .sidebar, .details { border-right: 1px solid #d0d7de; background: #fff; overflow: auto; }
    .details { border-right: none; border-left: 1px solid #d0d7de; }
    .main { display: grid; grid-template-rows: 48px 64px 1fr; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 0 12px; border-bottom: 1px solid #d0d7de; background: #fff; }
    .summary-strip { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; padding: 8px 10px; border-bottom: 1px solid #d0d7de; background: #fff; }
    .summary-card { background: #f8fafc; border: 1px solid #dbe4ee; border-radius: 8px; padding: 8px 10px; }
    .summary-card .k { font-size: 11px; color: #64748b; }
    .summary-card .v { font-size: 18px; font-weight: 700; }
    .trace-item { padding: 10px 12px; border-bottom: 1px solid #eef1f4; cursor: pointer; }
    .trace-item:hover { background: #f2f7ff; }
    .trace-item.active { background: #dbeafe; }
    .muted { color: #6b7280; font-size: 12px; }
    #graph { width: 100%; height: 100%; }
    .panel-title { margin: 0; padding: 12px; font-size: 14px; border-bottom: 1px solid #eef1f4; }
    .details-body { padding: 12px; }
    pre { white-space: pre-wrap; word-break: break-word; background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 8px; padding: 8px; font-size: 12px; }
    button { border: 1px solid #d0d7de; background: #fff; border-radius: 6px; padding: 6px 10px; cursor: pointer; }
    .files-list { max-height: 45vh; overflow: auto; border: 1px solid #e5e7eb; border-radius: 8px; }
    .file-row { padding: 8px; border-bottom: 1px solid #eef2f7; }
    .file-row:last-child { border-bottom: none; }
    .ops { font-size: 11px; color: #475569; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h3 class="panel-title">Trace IDs</h3>
      <div id="traceList"></div>
    </aside>

    <section class="main">
      <div class="header">
        <div>
          <strong id="traceTitle">No trace selected</strong>
          <span id="viewMode" class="muted" style="margin-left:8px;">High-level</span>
        </div>
        <div>
          <button id="zoomOutBtn">−</button>
          <button id="zoomInBtn">+</button>
          <button id="fitBtn">Fit</button>
          <button id="backBtn" style="display:none;">Back to high-level</button>
        </div>
      </div>
      <div class="summary-strip" id="summaryStrip">
        <div class="summary-card"><div class="k">Prompts</div><div class="v" id="sumPrompts">0</div></div>
        <div class="summary-card"><div class="k">Tool Steps</div><div class="v" id="sumTools">0</div></div>
        <div class="summary-card"><div class="k">Responses</div><div class="v" id="sumResponses">0</div></div>
        <div class="summary-card"><div class="k">Trace Status</div><div class="v" id="sumStatus">-</div></div>
      </div>
      <div id="graph"></div>
    </section>

    <aside class="details">
      <h3 class="panel-title">File Activity Summary</h3>
      <div class="details-body">
        <div id="traceSummaryMeta" class="muted" style="margin-bottom:8px;">No trace selected.</div>
        <div id="filesList" class="files-list"></div>
      </div>
      <h3 class="panel-title">Selection Details</h3>
      <div class="details-body" id="details">Select a node to inspect metadata.</div>
    </aside>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
