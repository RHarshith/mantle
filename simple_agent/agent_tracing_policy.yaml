# Tracks file-open syscalls issued by the agent's Python process.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: "agent-file-monitoring"
spec:
  kprobes:
    # ── Track file opens (sys_openat) ──────────────────────────────────────
    - call: "sys_openat"
      syscall: true
      args:
        - index: 0
          type: "int"       # dirfd
        - index: 1
          type: "string"    # pathname
        - index: 2
          type: "int"       # flags
      selectors:
        - matchBinaries:
            - operator: "In"
              values:
                - "/usr/bin/python3.12"
    # ── Track file writes (sys_write) — fd, buf ptr, count ────────────────
    - call: "sys_write"
      syscall: true
      args:
        - index: 0
          type: "int"       # fd
        - index: 1
          type: "char_buf"
          sizeArgIndex: 3   # length comes from arg index 2 (count)
        - index: 2
          type: "size_t"    # count
      selectors:
        - matchBinaries:
            - operator: "In"
              values:
                - "/usr/bin/python3.12"
